name: Cron Scraping

on:
  schedule:
    - cron: '*/5 * * * *' # 6 AM Bogotá
  workflow_dispatch:

env:
  # Esto es lo que evita que el workflow falle en el futuro cercano
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  call-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Esto a veces ayuda a que la acción sea más ligera
          sparse-checkout: . 

      - name: Call endpoint
        run: |
          curl -f -X GET "https://web-scraping-api-sooty.vercel.app/web-scraping-api-requests/scraping" \
               -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
               -H "User-Agent: GitHub-Actions-Bot"

name: Cron Scraping

on:
  schedule:
    # 6 AM Colombia (11:00 AM UTC)
    - cron: '*/5 * * * *'
  # Mantiene la opción de ejecutarlo manualmente para pruebas
  workflow_dispatch:

jobs:
  call-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Call endpoint
        run: |
          curl -X GET "https://web-scraping-api-sooty.vercel.app/web-scraping-api-requests/scraping" \
               -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
               -H "User-Agent: GitHub-Actions" \
               -f

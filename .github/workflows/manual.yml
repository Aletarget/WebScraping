name: Cron Scraping

on:
  schedule:
    # 6 AM Colombia (11:00 AM UTC)
    - cron: '*/5 * * * *'
  workflow_dispatch:

env:
  # Forzamos a que las acciones usen Node 24 según la recomendación de GitHub
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  call-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        # Aunque diga v4, al poner la variable de entorno arriba, 
        # GitHub intentará ejecutarla sobre el runtime de Node 24.
        uses: actions/checkout@v4

      - name: Call endpoint
        run: |
          curl -f -X GET "https://web-scraping-api-sooty.vercel.app/web-scraping-api-requests/scraping" \
               -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
               -H "User-Agent: GitHub-Actions-Bot"
